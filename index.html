// data.json をロードしてPROVIDERSを更新する
async function loadProviderData() {
  try {
    const resp = await fetch('./data.json');
    if (!resp.ok) throw new Error('fetch failed');
    const d = await resp.json();
    PROVIDERS = d.providers;
    if (d.lastUpdated) {
      const el = document.getElementById('last-updated');
      if (el) el.textContent = `データ更新日: ${d.lastUpdated}`;
    }
  } catch {
    PROVIDERS = PROVIDERS_FALLBACK;
  }
}
// 初期ロード
loadProviderData();

const RANK_EMOJI = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣', '6️⃣', '7️⃣', '8️⃣'];

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let _results  = [];
let _sortMode = 'score';
let _viewMode = 'card';
let _houseType = '';

// ─────────────────────────────────────────────
//  Budget slider
// ─────────────────────────────────────────────
const rng = document.getElementById('rng-budget');
const disp = document.getElementById('budget-disp');
function updateBudgetBar(v) {
  const pct = ((v - rng.min) / (rng.max - rng.min) * 100).toFixed(1);
  rng.style.background =
    `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, var(--border) ${pct}%)`;
  disp.textContent = v >= 8000 ? '上限なし' : `〜 ${Number(v).toLocaleString()}円 / 月`;
}
rng.addEventListener('input', () => updateBudgetBar(rng.value));
updateBudgetBar(rng.value);

// ─────────────────────────────────────────────
//  Compare
// ─────────────────────────────────────────────
async function doCompare() {
  await loadProviderData(); // 最新 data.json を取得
  const pref   = document.getElementById('sel-pref').value;
  const house  = document.getElementById('sel-house').value;
  const budget = parseInt(rng.value);
  const usages = [...document.querySelectorAll('.usage-check:checked')].map(c => c.value);
  _houseType = house;

  const filtered = PROVIDERS.filter(p => {
    // エリアフィルター
    if (pref && p.areas !== 'all' && !p.areas.includes(pref)) return false;
    // 予算フィルター
    const fee = house === 'mansion' ? p.feeMansion : p.feeKodate;
    if (budget < 8000 && fee > budget) return false;
    return true;
  });

  // スコア計算
  _results = filtered.map(p => {
    let score = 50;
    // 用途スコア
    usages.forEach(u => { score += (p.usageScore[u] || 0) * 10; });
    // 速度ボーナス（ゲーム・テレワーク選択時）
    if ((usages.includes('game') || usages.includes('telework')) && p.speedGbps >= 10) score += 15;
    // コスパボーナス
    const fee = house === 'mansion' ? p.feeMansion : p.feeKodate;
    score -= Math.max(0, (fee - 4000) / 100);
    return { ...p, score: Math.round(score), fee };
  });

  _sortMode = 'score';
  _viewMode = 'card';
  render();
  document.getElementById('results-section').style.display = 'block';
  document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
}

// ─────────────────────────────────────────────
//  Sort
// ─────────────────────────────────────────────
function setSort(mode, btn) {
  _sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function sorted() {
  const arr = [..._results];
  if (_sortMode === 'price')  arr.sort((a, b) => a.fee - b.fee);
  else if (_sortMode === 'speed') arr.sort((a, b) => b.speedGbps - a.speedGbps);
  else arr.sort((a, b) => b.score - a.score);
  return arr;
}

// ─────────────────────────────────────────────
//  View toggle
// ─────────────────────────────────────────────
function setView(mode, btn) {
  _viewMode = mode;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('cards-view').style.display = mode === 'card' ? 'block' : 'none';
  document.getElementById('table-view').style.display = mode === 'table' ? 'block' : 'none';
}

// ─────────────────────────────────────────────
//  Render
// ─────────────────────────────────────────────
function render() {
  const list = sorted();
  const maxScore = Math.max(...list.map(p => p.score), 1);

  // count
  document.getElementById('results-count').innerHTML =
    `<strong>${list.length}</strong> 件の光回線が見つかりました`;

  // Cards
  if (list.length === 0) {
    document.getElementById('cards-view').innerHTML =
      `<div class="empty-state"><div class="icon">🔍</div>
       <p>条件に合う回線が見つかりませんでした。<br>エリアや予算を変更して再検索してください。</p></div>`;
  } else {
    document.getElementById('cards-view').innerHTML = list.map((p, i) => {
      const feeLabel = _houseType === 'mansion' ? p.feeLabel.mansion : p.feeLabel.kodate;
      const scorePct = Math.round((p.score / maxScore) * 100);
      const isAreaLimited = p.areas !== 'all';
      return `
      <div class="provider-card" style="--provider-color:${p.color}">
        <div class="card-main">
          <div class="card-rank">${RANK_EMOJI[i] || (i+1)}</div>
          <div class="card-info">
            <div class="card-name-row">
              <span class="card-name">${p.name}</span>
              <span class="card-tag">${p.tag}</span>
              ${isAreaLimited ? `<span class="area-notice">⚠️ エリア限定</span>` : ''}
            </div>
            <div class="card-specs">
              <span>速度 <strong>${p.speedLabel}</strong></span>
              <span>契約 <strong>${p.contract}</strong></span>
            </div>
          </div>
          <div class="card-price-col">
            <div class="card-price">${feeLabel}<small>/月</small></div>
          </div>
        </div>
        <div class="score-row">
          <span class="score-label">おすすめ度</span>
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:${scorePct}%"></div>
          </div>
          <span class="score-val">${scorePct}%</span>
        </div>
        <div class="card-footer">
          <div class="card-features">
            ${p.features.map(f => `<span class="feature-chip">${f}</span>`).join('')}
          </div>
          <a class="btn-detail" href="${p.url}" target="_blank" rel="noopener">詳細・申込 →</a>
        </div>
        <div style="padding:0 20px 12px;font-size:.78rem;color:var(--muted)">
          🎁 ${p.campaign}
        </div>
      </div>`;
    }).join('');
  }

  // Table
  const rows = [
    ['月額料金', p => {
      const f = _houseType === 'mansion' ? p.feeLabel.mansion : p.feeLabel.kodate;
      return f;
    }],
    ['最大速度', p => p.speedLabel],
    ['契約期間', p => p.contract],
    ['工事費',   p => p.construction],
    ['特典・CB', p => p.campaign],
    ['エリア',   p => p.areaNote],
  ];
  const minFee = Math.min(...list.map(p => _houseType === 'mansion' ? p.feeMansion : p.feeKodate));
  const maxSpeed = Math.max(...list.map(p => p.speedGbps));

  document.getElementById('table-view').innerHTML = `
  <div class="compare-table-wrap">
    <table class="compare-table">
      <thead>
        <tr>
          <th>項目</th>
          ${list.map(p => `<th style="border-bottom:3px solid ${p.color}">${p.name}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${rows.map(([label, fn]) => `
        <tr>
          <td>${label}</td>
          ${list.map(p => {
            const val = fn(p);
            const isBestFee   = label === '月額料金' && (_houseType === 'mansion' ? p.feeMansion : p.feeKodate) === minFee;
            const isBestSpeed = label === '最大速度' && p.speedGbps === maxSpeed;
            const cls = (isBestFee || isBestSpeed) ? ' class="best"' : '';
            return `<td${cls}>${val}${(isBestFee||isBestSpeed)?'　✓':''}</td>`;
          }).join('')}
        </tr>`).join('')}
        <tr>
          <td>詳細</td>
          ${list.map(p => `<td><a href="${p.url}" target="_blank" rel="noopener"
            style="color:${p.color};font-weight:700;text-decoration:none">詳細 →</a></td>`).join('')}
        </tr>
      </tbody>
    </table>
  </div>`;
}
</script>
